<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background -->
    <div class="background"></div>

    <!-- Main Card -->
    <div class="weather-card">
        <!-- Header -->
        <div class="header">
            <div class="weather-icon">☀️☁️</div>
            <h1>Weather App</h1>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <input 
                type="text" 
                id="cityInput" 
                class="city-input" 
                placeholder="Enter city name..."
            />
            <button id="getWeatherBtn" class="get-weather-btn">
                Get Weather
            </button>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>

        <!-- Error Message -->
        <div id="error" class="error hidden"></div>

        <!-- Results Section -->
        <div id="results" class="results hidden">
            <div class="result-card">
                <div class="icon">📍</div>
                <div class="info">
                    <span class="label">Location:</span>
                    <span id="country" class="value">-</span>
                </div>
            </div>

            <div class="result-card">
                <div class="icon">🌐</div>
                <div class="info">
                    <span class="label">Latitude:</span>
                    <span id="latitude" class="value">-</span>
                </div>
            </div>

            <div class="result-card">
                <div class="icon">🌐</div>
                <div class="info">
                    <span class="label">Longitude:</span>
                    <span id="longitude" class="value">-</span>
                </div>
            </div>

            <div class="result-card">
                <div class="icon">🌡️</div>
                <div class="info">
                    <span class="label">Temperature:</span>
                    <span id="temperature" class="value">-</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
